<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <link rel="apple-touch-icon" href="/static/logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>實價登錄調查</title>

  <!-- Leaflet 地圖 -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #263347;
      --border: #334155;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --primary: #3b82f6;
      --primary-dark: #2563eb;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── 頂部工具列 ── */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      z-index: 100;
    }
    .topbar-logo {
      font-size: 1.1rem;
      font-weight: 700;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .topbar-logo span { color: var(--text-muted); font-size: 0.75rem; font-weight: 400; }

    /* 搜尋框 */
    .search-wrap {
      flex: 1;
      display: flex;
      gap: 8px;
      max-width: 560px;
    }
    .search-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--primary); }
    .search-input::placeholder { color: var(--text-muted); }

    /* 半徑選單 */
    .radius-select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
      cursor: pointer;
    }

    .btn {
      padding: 8px 18px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--text-muted); }

    /* 返回入口按鈕 */
    .btn-portal {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.8rem;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
    }
    .btn-portal:hover { color: var(--text); border-color: var(--text-muted); }

    /* ── 主內容區（左右分割） ── */
    .main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── 左側面板 ── */
    .panel {
      width: 420px;
      min-width: 320px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
      flex-shrink: 0;
    }

    /* 統計摘要區 */
    .summary-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      flex-shrink: 0;
    }
    .summary-bar.hidden { display: none; }
    .summary-title {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .mock-badge {
      background: #78350f;
      color: #fde68a;
      font-size: 0.65rem;
      padding: 1px 6px;
      border-radius: 4px;
    }
    .summary-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .stat-item {
      background: var(--surface2);
      border-radius: 8px;
      padding: 8px 10px;
      text-align: center;
    }
    .stat-value {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--primary);
    }
    .stat-label {
      font-size: 0.65rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* 結果清單 */
    .results-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .results-list::-webkit-scrollbar { width: 4px; }
    .results-list::-webkit-scrollbar-track { background: transparent; }
    .results-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* 空白佔位 */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      padding: 40px 20px;
      text-align: center;
    }
    .empty-state .icon { font-size: 3rem; opacity: 0.4; }
    .empty-state p { font-size: 0.9rem; line-height: 1.6; }

    /* 成交卡片 */
    .record-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .record-card:hover { border-color: var(--primary); background: var(--surface2); }
    .record-card.active { border-color: var(--primary); background: var(--surface2); }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 6px;
    }
    .card-addr {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
      flex: 1;
      margin-right: 8px;
    }
    .card-price {
      font-size: 1rem;
      font-weight: 700;
      color: var(--danger);
      white-space: nowrap;
    }
    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }
    .tag {
      font-size: 0.7rem;
      padding: 2px 7px;
      border-radius: 4px;
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .tag.type { color: #93c5fd; border-color: #1d4ed8; background: #1e3a5f; }
    .tag.date { color: #86efac; border-color: #166534; background: #14401f; }
    .card-unit {
      margin-top: 6px;
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .card-unit strong { color: var(--warning); }

    /* 卡片次要資訊列（格局/電梯/備註）+ 明細按鈕 */
    .card-extra {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 7px;
      gap: 6px;
    }
    .card-extra-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      flex: 1;
    }
    .tag.layout { color: #c4b5fd; border-color: #5b21b6; background: #2e1065; }
    .tag.elev   { color: #6ee7b7; border-color: #065f46; background: #064e3b; }
    .tag.note   { color: var(--warning); border-color: #78350f; background: #451a03; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-detail {
      font-size: 0.7rem;
      padding: 3px 9px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--surface2);
      color: var(--text-muted);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-detail:hover { border-color: var(--primary); color: var(--primary); }

    /* 明細 Modal */
    .detail-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 3000;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .detail-modal.show { display: flex; }
    .detail-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: 100%;
      max-width: 560px;
      max-height: 88vh;
      overflow-y: auto;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }
    .detail-head {
      position: sticky;
      top: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      z-index: 1;
    }
    .detail-head-left { flex: 1; }
    .detail-addr { font-size: 0.92rem; font-weight: 700; color: var(--text); line-height: 1.4; }
    .detail-price { font-size: 1.25rem; font-weight: 700; color: var(--danger); margin-top: 4px; }
    .detail-sub { font-size: 0.76rem; color: var(--text-muted); margin-top: 2px; }
    .detail-close {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
      padding: 2px 6px;
      flex-shrink: 0;
    }
    .detail-close:hover { color: var(--text); }
    .detail-body { padding: 14px 16px 20px; }
    .detail-section { margin-bottom: 16px; }
    .detail-section-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
      letter-spacing: 0.04em;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 14px;
    }
    .detail-grid.col3 { grid-template-columns: 1fr 1fr 1fr; }
    .detail-row { display: flex; flex-direction: column; gap: 2px; }
    .detail-label { font-size: 0.7rem; color: var(--text-muted); }
    .detail-value { font-size: 0.82rem; color: var(--text); font-weight: 500; }
    .detail-note {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 0.8rem;
      color: var(--warning);
      line-height: 1.5;
    }

    /* Loading */
    .loading-spinner {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px;
      color: var(--text-muted);
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 右側地圖 ── */
    #map {
      flex: 1;
      z-index: 1;
    }

    /* Leaflet popup 客製化 */
    .leaflet-popup-content-wrapper {
      background: var(--surface) !important;
      color: var(--text) !important;
      border: 1px solid var(--border) !important;
      border-radius: 10px !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
    }
    .leaflet-popup-tip { background: var(--surface) !important; }
    .popup-inner { padding: 2px; min-width: 180px; }
    .popup-addr { font-size: 0.82rem; font-weight: 600; margin-bottom: 6px; }
    .popup-price { font-size: 1.1rem; font-weight: 700; color: var(--danger); }
    .popup-unit { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
    .popup-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }

    /* 自訂地圖標記 */
    .price-marker {
      color: #fff;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 3px 7px 3px 5px;
      border-radius: 12px;
      white-space: nowrap;
      box-shadow: 0 2px 6px rgba(0,0,0,0.5);
      border: 1.5px solid rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      gap: 3px;
      line-height: 1.3;
    }
    .price-marker .m-icon { font-size: 0.8rem; line-height: 1; }
    .price-marker.active {
      background: var(--primary) !important;
      transform: scale(1.15);
    }

    /* 進階篩選區 */
    .filter-bar {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 10px 12px;
      flex-shrink: 0;
    }
    .filter-toggle {
      font-size: 0.8rem;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }
    .filter-toggle:hover { color: var(--primary); }
    .filter-toggle .arrow { transition: transform 0.2s; }
    .filter-bar.collapsed .filter-toggle .arrow { transform: rotate(-90deg); }
    .filter-bar.collapsed .filter-fields { display: none; }
    .filter-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 10px;
      font-size: 0.8rem;
    }
    .filter-fields label { color: var(--text-muted); display: block; margin-bottom: 2px; }
    .filter-fields select, .filter-fields input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 8px;
      color: var(--text);
      font-size: 0.8rem;
    }
    .filter-fields input[type="number"] { min-width: 0; }
    .filter-actions { margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-actions .btn { padding: 6px 12px; font-size: 0.8rem; }
    .filter-row-full { grid-column: 1 / -1; }

    /* 響應式：小螢幕 */
    @media (max-width: 700px) {
      .panel { width: 100%; min-width: unset; border-right: none; border-bottom: 1px solid var(--border); }
      .main { flex-direction: column; }
      #map { min-height: 260px; }
      .search-wrap { max-width: unset; }
      .topbar-logo span { display: none; }
      .filter-fields { grid-template-columns: 1fr; }
    }

    /* ── 通用意見反饋 ── */
    .gf-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }
    .gf-overlay.show { display: flex; }
    .gf-dialog {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .gf-dialog h3 { margin: 0 0 0.8rem; font-size: 1.1rem; color: var(--text); }
    .gf-dialog select {
      width: 100%;
      padding: 0.4rem;
      margin-bottom: 0.6rem;
      font-size: 0.88rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
    }
    .gf-dialog textarea {
      width: 100%;
      min-height: 80px;
      resize: vertical;
      font-size: 0.88rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      padding: 0.5rem;
      box-sizing: border-box;
      font-family: inherit;
    }
    .gf-dialog textarea:focus { outline: none; border-color: var(--primary); }
    .gf-dialog .gf-actions {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
      margin-top: 0.8rem;
    }
    .gf-dialog .gf-actions button {
      padding: 0.4rem 1rem;
      font-size: 0.85rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      background: var(--bg);
      color: var(--text);
    }
    .gf-dialog .gf-actions button.primary {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .gf-dialog .gf-toast {
      margin-top: 0.5rem;
      font-size: 0.82rem;
      color: var(--success);
    }
  </style>
</head>
<body>

<!-- ── 頂部工具列 ── -->
<header class="topbar">
  <div class="topbar-logo">
    📊 實價登錄
    <span>附近成交查詢</span>
  </div>

  <div class="search-wrap">
    <input id="search-input" class="search-input" type="text"
      placeholder="輸入地址或地段關鍵字，如：中華路、豐成段"
      autocomplete="off">
    <button class="btn btn-primary" onclick="doSearch()">查詢</button>
  </div>

  <button onclick="document.getElementById('gf-overlay').classList.add('show');" style="display:flex;align-items:center;gap:8px;padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:none;color:var(--text-muted);font-size:0.85rem;cursor:pointer;transition:color 0.15s;" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--text-muted)'">💬 反饋</button>
  <button id="btn-admin-import" style="display:none;" onclick="openImportModal()" class="btn btn-ghost" title="匯入實價登錄資料（管理員）">📥 匯入</button>
  <a id="btn-portal" href="/" class="btn-portal">🏠 入口</a>
</header>

<!-- ── 主內容 ── -->
<div class="main">

  <!-- 左側面板 -->
  <div class="panel">

    <!-- 進階篩選（預設收合） -->
    <div id="filter-bar" class="filter-bar collapsed">
      <div class="filter-toggle" onclick="toggleFilter()">
        <span class="arrow">▼</span> 進階篩選（鄉鎮、類型、總價、坪數、排序）
      </div>
      <div class="filter-fields">
        <div>
          <label>鄉鎮市區</label>
          <select id="filter-district">
            <option value="">全部</option>
          </select>
        </div>
        <div>
          <label>交易類型</label>
          <select id="filter-type">
            <option value="">全部</option>
          </select>
        </div>
        <div>
          <label>總價最低（萬元）</label>
          <input id="filter-min-price" type="number" min="0" placeholder="不限制">
        </div>
        <div>
          <label>總價最高（萬元）</label>
          <input id="filter-max-price" type="number" min="0" placeholder="不限制">
        </div>
        <div>
          <label>坪數最低</label>
          <input id="filter-min-ping" type="number" min="0" step="0.1" placeholder="不限制">
        </div>
        <div>
          <label>坪數最高</label>
          <input id="filter-max-ping" type="number" min="0" step="0.1" placeholder="不限制">
        </div>
        <div>
          <label>排序</label>
          <select id="filter-sort">
            <option value="date_desc">交易日期 新→舊</option>
            <option value="date_asc">交易日期 舊→新</option>
            <option value="price_desc">總價 高→低</option>
            <option value="price_asc">總價 低→高</option>
            <option value="unit_desc">單價 高→低</option>
            <option value="unit_asc">單價 低→高</option>
          </select>
        </div>
        <div class="filter-row-full filter-actions">
          <button type="button" class="btn btn-primary" onclick="doSearch()">查詢</button>
          <button type="button" class="btn btn-ghost" onclick="clearFilter()">清除篩選</button>
        </div>
      </div>
    </div>

    <!-- 統計摘要 -->
    <div id="summary-bar" class="summary-bar hidden">
      <div class="summary-title">
        <span id="summary-count">共 0 筆</span>
        <span id="mock-badge" class="mock-badge hidden">⚠ 示範資料</span>
      </div>
      <div class="summary-stats">
        <div class="stat-item">
          <div class="stat-value" id="stat-avg-unit">—</div>
          <div class="stat-label">平均單價（萬/坪）</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="stat-max-total">—</div>
          <div class="stat-label">最高總價（萬）</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="stat-min-total">—</div>
          <div class="stat-label">最低總價（萬）</div>
        </div>
      </div>
    </div>

    <!-- 載入中 -->
    <div id="loading" class="loading-spinner">
      <div class="spinner"></div>
      <span>查詢中…</span>
    </div>

    <!-- 空白佔位 -->
    <div id="empty-state" class="empty-state">
      <div class="icon">🏡</div>
      <p>臺東縣實價登錄（資料至 114 年）<br>輸入關鍵字或使用進階篩選後按「查詢」</p>
    </div>

    <!-- 成交清單 -->
    <div id="results-list" class="results-list" style="display:none;"></div>

  </div>

  <!-- 右側地圖 -->
  <div id="map"></div>

</div>

<script>
// ── 全域狀態 ──────────────────────────────────────────────────────────
var _portalUrl = '/';
var _map = null;
var _markers = {};        // id -> Leaflet marker
var _activeId = null;     // 目前選中的成交紀錄 id
var _results = [];        // 目前查詢結果

// ── 初始化 ────────────────────────────────────────────────────────────
(function init() {
  // 先取得 Portal URL，再驗證登入（避免 race condition）
  // 若 /api/config 尚未回來就跳轉，_portalUrl 還是 '/' 會造成無限循環
  fetch('/api/config').then(function(r) { return r.json(); }).then(function(cfg) {
    _portalUrl = (cfg.portal_url || '').replace(/\/?$/, '') || '/';
    document.getElementById('btn-portal').href = _portalUrl;

    // config 回來後才確認登入狀態
    return fetch('/api/me');
  }).then(function(r) {
    if (!r) return;
    if (r.status === 401) {
      // 優先用後端回傳的 redirect 欄位，雙重保險
      return r.json().then(function(body) {
        window.location.href = (body && body.redirect) ? body.redirect : _portalUrl;
      });
    }
    return r.json();
  }).then(function(me) {
    if (!me) return;
    // 管理員才顯示匯入按鈕
    if (me.is_admin) {
      document.getElementById('btn-admin-import').style.display = '';
    }
  }).catch(function() {});

  // 初始化地圖（預設台東市中心）
  _map = L.map('map', { zoomControl: true }).setView([22.7583, 121.1444], 14);

  // OSM 底圖
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 19,
  }).addTo(_map);

  // Enter 鍵觸發搜尋
  document.getElementById('search-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doSearch();
  });

  // 進入頁面時自動查詢一筆，載入臺東資料與篩選選項
  doSearch();
})();

// ── 執行搜尋 ──────────────────────────────────────────────────────────
function doSearch() {
  var query = document.getElementById('search-input').value.trim();
  var district = (document.getElementById('filter-district') && document.getElementById('filter-district').value) || '';
  var transactionType = (document.getElementById('filter-type') && document.getElementById('filter-type').value) || '';
  var minPrice = document.getElementById('filter-min-price') ? document.getElementById('filter-min-price').value.trim() : '';
  var maxPrice = document.getElementById('filter-max-price') ? document.getElementById('filter-max-price').value.trim() : '';
  var minPing = document.getElementById('filter-min-ping') ? document.getElementById('filter-min-ping').value.trim() : '';
  var maxPing = document.getElementById('filter-max-ping') ? document.getElementById('filter-max-ping').value.trim() : '';
  var sort = document.getElementById('filter-sort') ? document.getElementById('filter-sort').value : 'date_desc';

  var body = { query: query, sort: sort, limit: 200 };
  if (district) body.district = district;
  if (transactionType) body.transaction_type = transactionType;
  if (minPrice !== '') body.min_price = parseFloat(minPrice);
  if (maxPrice !== '') body.max_price = parseFloat(maxPrice);
  if (minPing !== '') body.min_ping = parseFloat(minPing);
  if (maxPing !== '') body.max_ping = parseFloat(maxPing);

  setLoadingState(true);

  fetch('/api/search', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    setLoadingState(false);
    if (data.error) {
      alert('查詢失敗：' + data.error);
      return;
    }
    fillFilterOptions(data.filter_options);
    renderResults(data);
  })
  .catch(function(err) {
    setLoadingState(false);
    alert('連線錯誤，請稍後再試。');
    console.error(err);
  });
}

// 填寫鄉鎮 / 交易類型下拉選單（僅在選項尚未填過時）
function fillFilterOptions(opts) {
  if (!opts) return;
  var districtEl = document.getElementById('filter-district');
  var typeEl = document.getElementById('filter-type');
  if (districtEl && opts.districts && opts.districts.length > 0 && districtEl.options.length <= 1) {
    opts.districts.forEach(function(d) {
      var o = document.createElement('option');
      o.value = d;
      o.textContent = d;
      districtEl.appendChild(o);
    });
  }
  if (typeEl && opts.transaction_types && opts.transaction_types.length > 0 && typeEl.options.length <= 1) {
    opts.transaction_types.forEach(function(t) {
      var o = document.createElement('option');
      o.value = t;
      o.textContent = t;
      typeEl.appendChild(o);
    });
  }
}

function toggleFilter() {
  document.getElementById('filter-bar').classList.toggle('collapsed');
}

function clearFilter() {
  document.getElementById('search-input').value = '';
  var districtEl = document.getElementById('filter-district');
  var typeEl = document.getElementById('filter-type');
  if (districtEl) districtEl.value = '';
  if (typeEl) typeEl.value = '';
  document.getElementById('filter-min-price').value = '';
  document.getElementById('filter-max-price').value = '';
  document.getElementById('filter-min-ping').value = '';
  document.getElementById('filter-max-ping').value = '';
  document.getElementById('filter-sort').value = 'date_desc';
  doSearch();
}

// ── 渲染結果 ──────────────────────────────────────────────────────────
function renderResults(data) {
  _results = data.results || [];
  var summary = data.summary || {};
  var isMock = data.is_mock;

  // 更新統計摘要
  var summaryBar = document.getElementById('summary-bar');
  if (_results.length > 0) {
    summaryBar.classList.remove('hidden');
    var total = summary.count != null ? summary.count : _results.length;
    var shown = summary.shown != null ? summary.shown : _results.length;
    document.getElementById('summary-count').textContent = total === shown ? ('共 ' + total + ' 筆') : ('共 ' + total + ' 筆（顯示 ' + shown + ' 筆）');
    document.getElementById('stat-avg-unit').textContent = summary.avg_unit || '—';
    document.getElementById('stat-max-total').textContent = summary.max_total || '—';
    document.getElementById('stat-min-total').textContent = summary.min_total || '—';
    var mockBadge = document.getElementById('mock-badge');
    if (isMock) mockBadge.classList.remove('hidden');
    else mockBadge.classList.add('hidden');
  } else {
    summaryBar.classList.add('hidden');
  }

  // 清除舊標記
  Object.values(_markers).forEach(function(m) { _map.removeLayer(m); });
  _markers = {};
  _activeId = null;

  // 渲染清單
  var list = document.getElementById('results-list');
  var empty = document.getElementById('empty-state');

  if (_results.length === 0) {
    list.style.display = 'none';
    empty.style.display = 'flex';
    empty.innerHTML = '<div class="icon">🔍</div><p>沒有找到符合條件的成交紀錄</p>';
    return;
  }

  empty.style.display = 'none';
  list.style.display = 'flex';

  var html = '';
  _results.forEach(function(r) {
    var typeLabel = r.building_type || r.transaction_type || '—';
    var floorLabel = (r.floor != null && r.total_floor != null && r.total_floor > 0) ? (r.floor + '/' + r.total_floor + ' 樓') : ((r.floor ? r.floor + ' 樓' : '') || '—');
    var pingVal = (r.building_ping != null && r.building_ping > 0) ? (r.building_ping + ' 坪') : '—';

    // 格局標籤（如：2房1廳1衛）
    var layoutParts = [];
    if (r.rooms > 0)     layoutParts.push(r.rooms + '房');
    if (r.halls > 0)     layoutParts.push(r.halls + '廳');
    if (r.bathrooms > 0) layoutParts.push(r.bathrooms + '衛');
    var layoutLabel = layoutParts.join('') || '';

    // 電梯
    var elevLabel = (r.elevator === '有') ? '有電梯' : (r.elevator === '無' ? '無電梯' : '');

    html += '<div class="record-card" id="card-' + r.id + '" onclick="selectRecord(\'' + r.id + '\')">' +
      '<div class="card-header">' +
        '<div class="card-addr">' + escHtml(r.address) + '</div>' +
        '<div class="card-price">' + r.total_price + ' 萬</div>' +
      '</div>' +
      '<div class="card-meta">' +
        '<span class="tag type">' + escHtml(typeLabel) + '</span>' +
        '<span class="tag">' + pingVal + '</span>' +
        '<span class="tag">' + floorLabel + '</span>' +
        (r.age != null && r.age > 0 ? '<span class="tag">屋齡 ' + r.age + ' 年</span>' : '') +
        '<span class="tag date">' + (r.date || '') + '</span>' +
      '</div>' +
      '<div class="card-unit">單價 <strong>' + (r.unit_price != null && r.unit_price > 0 ? r.unit_price + ' 萬/坪' : '—') + '</strong></div>' +
      // 格局/電梯次要資訊 + 明細按鈕
      '<div class="card-extra">' +
        '<div class="card-extra-tags">' +
          (layoutLabel ? '<span class="tag layout">' + layoutLabel + '</span>' : '') +
          (elevLabel   ? '<span class="tag elev">'   + elevLabel   + '</span>' : '') +
          (r.note      ? '<span class="tag note" title="' + escHtml(r.note) + '">' + escHtml(r.note) + '</span>' : '') +
        '</div>' +
        '<button class="btn-detail" onclick="event.stopPropagation();openDetailModal(\'' + r.id + '\')">明細</button>' +
      '</div>' +
    '</div>';
  });
  list.innerHTML = html;

  // 在地圖上加標記
  var bounds = [];
  _results.forEach(function(r) {
    if (!r.lat || !r.lng) return;
    var mi = getMarkerInfo(r);
    var icon = L.divIcon({
      className: '',
      html: '<div class="price-marker" style="background:' + mi.bg + '">' +
              '<span class="m-icon">' + mi.icon + '</span>' + r.total_price + '萬' +
            '</div>',
      iconAnchor: [36, 14],
    });
    var marker = L.marker([r.lat, r.lng], { icon: icon }).addTo(_map);
    marker.bindPopup(buildPopup(r), { maxWidth: 240 });
    marker.on('click', function() { selectRecord(r.id); });
    _markers[r.id] = marker;
    bounds.push([r.lat, r.lng]);
  });

  // 自動縮放到所有標記
  if (bounds.length > 0) {
    _map.fitBounds(bounds, { padding: [40, 40] });
  }
}

// ── 選取成交紀錄（地圖 ↔ 清單同步） ────────────────────────────────
function selectRecord(id) {
  // 清除上一個選中
  if (_activeId) {
    var prevCard = document.getElementById('card-' + _activeId);
    if (prevCard) prevCard.classList.remove('active');
    var prevMarker = _markers[_activeId];
    if (prevMarker) {
      var el = prevMarker.getElement();
      if (el) el.querySelector('.price-marker').classList.remove('active');
    }
  }

  _activeId = id;

  // 高亮卡片
  var card = document.getElementById('card-' + id);
  if (card) {
    card.classList.add('active');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // 高亮標記 + 開啟 popup
  var marker = _markers[id];
  if (marker) {
    var el = marker.getElement();
    if (el) el.querySelector('.price-marker').classList.add('active');
    marker.openPopup();
    _map.panTo(marker.getLatLng(), { animate: true });
  }
}

// ── 建物類型 → 圖示 + 顏色 ─────────────────────────────────────────
function getMarkerInfo(r) {
  var type = r.building_type || '';
  if (type.indexOf('透天') !== -1) return { icon: '🏠', bg: '#f97316' }; // 橘：透天厝
  if (type.indexOf('大樓') !== -1) return { icon: '🏢', bg: '#3b82f6' }; // 藍：住宅大樓
  if (type.indexOf('華廈') !== -1) return { icon: '🏙', bg: '#8b5cf6' }; // 紫：華廈
  if (type.indexOf('公寓') !== -1) return { icon: '🏘', bg: '#10b981' }; // 綠：公寓
  if (type.indexOf('套房') !== -1) return { icon: '🛏', bg: '#06b6d4' }; // 青：套房
  if (type.indexOf('店面') !== -1 || type.indexOf('店鋪') !== -1) return { icon: '🏪', bg: '#f59e0b' }; // 黃：店面
  if (type.indexOf('辦公') !== -1) return { icon: '🏬', bg: '#6366f1' }; // 靛：辦公
  if (type.indexOf('廠') !== -1)   return { icon: '🏭', bg: '#6b7280' }; // 灰：廠辦
  return { icon: '🌿', bg: '#64748b' }; // 預設：土地/其他
}

// ── 建立 popup HTML ──────────────────────────────────────────────────
function buildPopup(r) {
  var mi = getMarkerInfo(r);
  var typeLabel = r.building_type || r.transaction_type || '—';
  var unitStr = (r.unit_price != null && r.unit_price > 0) ? (r.unit_price + ' 萬/坪') : '—';
  var pingStr = (r.building_ping != null && r.building_ping > 0) ? (r.building_ping + ' 坪') : '—';
  return '<div class="popup-inner">' +
    '<div class="popup-addr">' + mi.icon + ' ' + escHtml(r.address) + '</div>' +
    '<div class="popup-price">' + r.total_price + ' 萬元</div>' +
    '<div class="popup-unit">單價 ' + unitStr + ' ｜ ' + pingStr + '</div>' +
    '<div class="popup-meta">' +
      '<span class="tag type">' + escHtml(typeLabel) + '</span>' +
      '<span class="tag date">' + (r.date || '') + '</span>' +
    '</div>' +
  '</div>';
}

// ── 明細 Modal ───────────────────────────────────────────────────────
function openDetailModal(id) {
  var r = _results.find(function(x) { return x.id === id; });
  if (!r) return;

  // 標頭
  document.getElementById('dm-addr').textContent = r.address || '';
  document.getElementById('dm-price').textContent = r.total_price + ' 萬元';

  // 副標（單價、坪數、日期）
  var subParts = [];
  if (r.unit_price > 0) subParts.push('單價 ' + r.unit_price + ' 萬/坪');
  if (r.building_ping > 0) subParts.push('建物 ' + r.building_ping + ' 坪');
  subParts.push(r.date || '');
  document.getElementById('dm-sub').textContent = subParts.join('　｜　');

  // 主體
  document.getElementById('dm-body').innerHTML = buildDetailBody(r);

  document.getElementById('detail-modal').classList.add('show');
}

function closeDetailModal() {
  document.getElementById('detail-modal').classList.remove('show');
}

function buildDetailBody(r) {
  function row(label, val) {
    return '<div class="detail-row"><span class="detail-label">' + label + '</span><span class="detail-value">' + escHtml(String(val || '—')) + '</span></div>';
  }

  // 格局字串
  var layoutParts = [];
  if (r.rooms > 0)     layoutParts.push(r.rooms + '房');
  if (r.halls > 0)     layoutParts.push(r.halls + '廳');
  if (r.bathrooms > 0) layoutParts.push(r.bathrooms + '衛');
  var layoutStr = layoutParts.join('') || '—';

  // 使用分區
  var zoneStr = r.urban_zone || r.non_urban_zone || r.non_urban_use || '—';

  // 車位
  var parkStr = r.park_type ? (r.park_type + (r.park_price > 0 ? '（' + r.park_price + ' 萬）' : '')) : '無';

  var html = '';

  // ── 備註（只在有備註時顯示）
  if (r.note) {
    html += '<div class="detail-section">' +
      '<div class="detail-section-title">備註資料</div>' +
      '<div class="detail-note">' + escHtml(r.note) + '</div>' +
    '</div>';
  }

  // ── 基本資料
  html += '<div class="detail-section">' +
    '<div class="detail-section-title">基本資料</div>' +
    '<div class="detail-grid col3">' +
      row('總價', r.total_price + ' 萬') +
      row('單價', r.unit_price > 0 ? r.unit_price + ' 萬/坪' : '—') +
      row('交易日期', r.date || '—') +
      row('主要用途', r.main_use || '—') +
      row('主要建材', r.material || '—') +
      row('管理組織', r.mgmt || '—') +
      row('電梯', r.elevator || '—') +
      row('建物格局', layoutStr) +
      row('車位', parkStr) +
    '</div>' +
  '</div>';

  // ── 土地資料
  html += '<div class="detail-section">' +
    '<div class="detail-section-title">土地資料</div>' +
    '<div class="detail-grid">' +
      row('土地位置', (r.land_sect && r.land_no) ? r.land_sect + ' ' + r.land_no : '—') +
      row('土地移轉面積', r.land_ping > 0 ? r.land_ping + ' 坪' : '—') +
      row('使用分區', zoneStr) +
      row('交易標的', r.transaction_type || '—') +
    '</div>' +
  '</div>';

  // ── 建物資料（只在有建物時顯示）
  if (r.building_ping > 0) {
    var floorStr = (r.floor && r.total_floor > 0) ? (r.floor + ' 樓 / 共 ' + r.total_floor + ' 樓') : (r.floor ? r.floor + ' 樓' : '—');
    html += '<div class="detail-section">' +
      '<div class="detail-section-title">建物資料</div>' +
      '<div class="detail-grid">' +
        row('建物型態', r.building_type || '—') +
        row('屋齡', r.age > 0 ? r.age + ' 年' : '—') +
        row('樓層', floorStr) +
        row('建物總面積', r.building_ping + ' 坪') +
        row('主建物面積', r.main_building_ping > 0 ? r.main_building_ping + ' 坪' : '—') +
        row('格局', layoutStr) +
      '</div>' +
    '</div>';
  }

  return html;
}

function openImportModal() {
  var modal = document.getElementById('import-modal');
  modal.style.display = 'flex';
  document.getElementById('import-init-panel').style.display = '';
  document.getElementById('import-progress-panel').style.display = 'none';
  document.getElementById('import-done-panel').style.display = 'none';
  document.getElementById('import-log').innerHTML = '';
  document.getElementById('import-file-input').value = '';
  document.getElementById('geocode-bar-fill').style.width = '0%';
  document.getElementById('import-geocode-bar').style.display = 'none';
  document.getElementById('import-start-btn').disabled = false;
}

function closeImportModal() {
  document.getElementById('import-modal').style.display = 'none';
}

function startImport() {
  var fileInput = document.getElementById('import-file-input');
  if (!fileInput.files.length) { alert('請選擇 ZIP 檔案'); return; }

  document.getElementById('import-start-btn').disabled = true;
  document.getElementById('import-init-panel').style.display = 'none';
  document.getElementById('import-progress-panel').style.display = '';

  var log    = document.getElementById('import-log');
  var geoBar = document.getElementById('import-geocode-bar');
  var geoFill = document.getElementById('geocode-bar-fill');
  var geoText = document.getElementById('geocode-bar-text');

  function addLog(msg, isErr) {
    var line = document.createElement('div');
    line.style.cssText = isErr ? 'color:var(--danger);padding:2px 0;' : 'padding:2px 0;';
    line.textContent = msg;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
  }

  var fd = new FormData();
  fd.append('file', fileInput.files[0]);

  fetch('/api/admin/import', { method: 'POST', body: fd })
    .then(function(resp) {
      if (!resp.ok) {
        return resp.json().then(function(e) { addLog('❌ ' + (e.error || '伺服器錯誤'), true); });
      }
      var reader  = resp.body.getReader();
      var decoder = new TextDecoder();
      var buf = '';

      function pump(done, value) {
        if (done) return;
        buf += decoder.decode(value, { stream: true });
        var parts = buf.split('\n\n');
        buf = parts.pop();  // 最後一段可能未結束，留待下次
        parts.forEach(function(block) {
          block = block.trim();
          if (!block.startsWith('data: ')) return;
          try {
            var e = JSON.parse(block.slice(6));
            if (e.type === 'log') {
              addLog(e.msg);
            } else if (e.type === 'geocode_start') {
              geoBar.style.display = '';
              geoFill.style.width = '0%';
              geoText.textContent = '0 / ' + e.total;
            } else if (e.type === 'geocode_progress') {
              var pct = Math.round(e.current / e.total * 100);
              geoFill.style.width = pct + '%';
              geoText.textContent = e.current + ' / ' + e.total;
              addLog(e.msg);
            } else if (e.type === 'error') {
              addLog('❌ ' + e.msg, true);
            } else if (e.type === 'done') {
              document.getElementById('import-progress-panel').style.display = 'none';
              var dp = document.getElementById('import-done-panel');
              dp.style.display = 'flex';
              document.getElementById('import-done-summary').innerHTML =
                '✅ 匯入完成！<br>' +
                '新增 <b>' + e.added + '</b> 筆 ／ 更新 <b>' + e.updated + '</b> 筆<br>' +
                '補座標成功 <b>' + e.geocoded + '</b> 筆（查無 ' + e.geo_fail + ' 筆）';
            }
          } catch (_) {}
        });
        return reader.read().then(function(r) { return pump(r.done, r.value); });
      }
      return reader.read().then(function(r) { return pump(r.done, r.value); });
    })
    .catch(function(err) { addLog('❌ 連線失敗：' + err.message, true); });
}

// ── UI 狀態切換 ──────────────────────────────────────────────────────
function setLoadingState(on) {
  document.getElementById('loading').style.display = on ? 'flex' : 'none';
  document.getElementById('results-list').style.display = on ? 'none' : '';
  document.getElementById('empty-state').style.display = on ? 'none' : '';
  document.getElementById('summary-bar').classList.add('hidden');
  if (on) document.getElementById('results-list').style.display = 'none';
}

// ── 工具函式 ─────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

      <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;">
        <span style="font-weight:700;">📥 匯入實價登錄資料</span>
        <button onclick="closeImportModal()" style="background:none;border:none;color:var(--text-muted);font-size:1.3rem;cursor:pointer;line-height:1;" title="關閉">✕</button>
      </div>

      <!-- 選檔面板 -->
      <div id="import-init-panel" style="padding:24px 20px;display:flex;flex-direction:column;gap:16px;">
        <p style="color:var(--text-muted);font-size:0.88rem;">選擇從內政部實價登錄網站下載的 <b>.zip</b> 檔案（臺東縣）</p>
        <input type="file" id="import-file-input" accept=".zip"
               style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);cursor:pointer;">
        <div style="display:flex;gap:8px;justify-content:flex-end;">
          <button class="btn btn-ghost" onclick="closeImportModal()">取消</button>
          <button class="btn btn-primary" id="import-start-btn" onclick="startImport()">開始匯入</button>
        </div>
      </div>

      <!-- 進度面板 -->
      <div id="import-progress-panel" style="display:none;padding:16px 20px;overflow-y:auto;flex:1;min-height:0;">
        <div id="import-log" style="font-family:monospace;font-size:0.82rem;display:flex;flex-direction:column;gap:4px;margin-bottom:12px;"></div>
        <!-- 地號進度條 -->
        <div id="import-geocode-bar" style="display:none;margin-top:8px;">
          <div style="background:var(--bg);border-radius:6px;height:8px;overflow:hidden;margin-bottom:6px;">
            <div id="geocode-bar-fill" style="height:100%;background:var(--success);border-radius:6px;width:0%;transition:width 0.3s;"></div>
          </div>
          <div id="geocode-bar-text" style="font-size:0.8rem;color:var(--text-muted);"></div>
        </div>
      </div>

      <!-- 完成面板 -->
      <div id="import-done-panel" style="display:none;padding:24px 20px;text-align:center;display:none;flex-direction:column;gap:16px;align-items:center;">
        <div id="import-done-summary" style="font-size:0.95rem;line-height:2;"></div>
        <button class="btn btn-primary" onclick="closeImportModal(); doSearch();">關閉並重新查詢</button>
      </div>

    </div>
  </div>

  <!-- 通用意見反饋對話框 -->
  <div class="gf-overlay" id="gf-overlay">
    <div class="gf-dialog">
      <h3>💬 意見反饋</h3>
      <select id="gf-category">
        <option value="功能建議">功能建議</option>
        <option value="分類錯誤">分類錯誤回報</option>
        <option value="資料問題">資料不準確</option>
        <option value="介面體驗">介面體驗改進</option>
        <option value="其他">其他</option>
      </select>
      <textarea id="gf-text" placeholder="請輸入您的意見或建議…"></textarea>
      <div class="gf-actions">
        <button id="gf-cancel">取消</button>
        <button id="gf-submit" class="primary">送出</button>
      </div>
      <div class="gf-toast" id="gf-toast" style="display:none;"></div>
    </div>
  </div>

<script>
  // ── 通用意見反饋對話框 ──
  (function() {
    const overlay = document.getElementById("gf-overlay");
    const cancelBtn = document.getElementById("gf-cancel");
    const submitBtn = document.getElementById("gf-submit");
    const textEl = document.getElementById("gf-text");
    const catEl = document.getElementById("gf-category");
    const toast = document.getElementById("gf-toast");

    cancelBtn.addEventListener("click", () => { overlay.classList.remove("show"); });
    overlay.addEventListener("click", (e) => { if (e.target === overlay) overlay.classList.remove("show"); });

    submitBtn.addEventListener("click", () => {
      const text = textEl.value.trim();
      if (!text) { textEl.style.borderColor = "var(--danger)"; return; }
      textEl.style.borderColor = "";
      fetch("/api/general-feedback", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text, category: catEl.value }),
      }).then(r => r.json()).then(d => {
        toast.textContent = "✅ 感謝您的意見！已記錄。";
        toast.style.display = "block";
        textEl.value = "";
        setTimeout(() => { toast.style.display = "none"; overlay.classList.remove("show"); }, 1500);
      });
    });
  })();
</script>

<!-- ── 明細 Modal ── -->
<div id="detail-modal" class="detail-modal" onclick="if(event.target===this)closeDetailModal()">
  <div class="detail-box">
    <div class="detail-head">
      <div class="detail-head-left">
        <div class="detail-addr" id="dm-addr"></div>
        <div class="detail-price" id="dm-price"></div>
        <div class="detail-sub" id="dm-sub"></div>
      </div>
      <button class="detail-close" onclick="closeDetailModal()">✕</button>
    </div>
    <div class="detail-body" id="dm-body"></div>
  </div>
</div>
</body>
</html>
